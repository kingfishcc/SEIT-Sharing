                    ];
                } else if (keyword.includes('好難喔')) {
                    responses = [
                        {
                            id: Date.now() + 1,
                            sender: 'bot',
                            type: 'rich-text',
                            content: (
                                <div className="flex flex-col gap-[0.8em] leading-relaxed">
                                    <div className="font-bold border-b border-gray-100 pb-1">〡好難喔</div>
                                    
                                    <div className="text-gray-800">
                                        國文課入班時，不確定自己還可以做什麼？
                                    </div>

                                    <div className="flex flex-col gap-[0.4em]">
                                        <div className="flex items-start">
                                            <span className="shrink-0 mr-[0.3em]">●</span>
                                            <span>目前狀況：</span>
                                        </div>
                                        <div className="ml-[1.2em] text-gray-700">
                                            會陪特殊生練習抽背、調整習作和評量，但這些算是課堂以外的協助。上課時除了指導學習較弱的學生，我比較像幫忙管秩序的老師，整節課好像沒有做什麼就下課了。
                                        </div>
                                    </div>

                                    <div className="mt-3 text-red-600 font-bold text-xl md:text-2xl text-center py-3 border-y-2 border-red-100 bg-red-50/30">
                                        這樣真的有關照到特殊生的需求嗎？
                                    </div>

                                    <div className="mt-2 text-black text-[0.95em] font-medium bg-gray-50 p-2 rounded-lg text-center">
                                        請打開選單點選【結尾】。
                                    </div>
                                </div>
                            ),
                            time
                        }
                    ];
                } else if (keyword.includes('結尾')) {
                    responses = [
                        {
                            id: Date.now() + 1,
                            sender: 'bot',
                            type: 'rich-text',
                            content: (
                                <div className="flex flex-col gap-[0.5em] leading-relaxed text-center py-6 px-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12 text-red-400 mx-auto animate-bounce mb-2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                                    <div className="text-2xl md:text-3xl font-bold text-gray-900 mb-2">
                                        感謝各位老師的聆聽！
                                    </div>
                                    <div className="text-sm md:text-base text-gray-500">
                                        如果有任何建議或想交流的問題，
                                    </div>
                                    <div className="text-sm md:text-base text-gray-500">
                                        歡迎隨時告訴我～～～
                                    </div>
                                    <div className="bg-blue-50 text-blue-600 text-[10px] md:text-xs py-2 px-4 rounded-full mt-6 mx-auto w-fit font-medium">
                                        114-2 南區巡迴輔導教師督導會議 ‧ 品蓁
                                    </div>
                                </div>
                            ),
                            time
                        }
                    ];
                }

                return responses;
            };

            const handleSendMessage = (text = inputValue) => {
                if (isTyping) return; // 新增防呆機制：機器人打字時不接受新訊息
                if (!text.trim()) return;

                const userMessage = {
                    id: Date.now(),
                    sender: 'user',
                    type: 'text',
                    text: text,
                    time: getCurrentTime()
                };
                
                setMessages(prev => [...prev, userMessage]);
                setInputValue('');
                setShowRichMenu(false); 
                
                const botResponses = generateBotResponse(text);

                if (botResponses.length > 0) {
                    setIsTyping(true);
                    setTimeout(() => {
                        botResponses.forEach((response, index) => {
                            setTimeout(() => {
                                setMessages(prev => [...prev, response]);
                                if (index === botResponses.length - 1) {
                                    setIsTyping(false);
                                }
                            }, index * 800); 
                        });
                    }, 1000);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };

            return (
                <div className="w-full h-[100dvh] bg-[#8babc6] flex flex-col relative overflow-hidden" style={{ fontFamily: "'GenSenRounded TW', 'Chiron GoRound TC', sans-serif" }}>

                    <div className="bg-[#2e3b4e] text-white px-4 md:px-8 py-3 md:py-4 shadow-md z-10">
                        <div className="w-full flex items-center justify-between">
                            <div className="flex items-center gap-2 md:gap-3">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 md:w-8 md:h-8 cursor-pointer flex-shrink-0"><path d="m15 18-6-6 6-6"/></svg>
                                <div className="flex flex-col">
                                    <span className="font-bold text-[13px] sm:text-base md:text-lg tracking-wide leading-tight">114-2 南區巡迴輔導教師督導會議 115.5.13（三）</span>
                                    <span className="text-[11px] sm:text-xs md:text-sm text-gray-300 mt-0.5">分享者：玉東國中<span className="inline-block w-3"></span>李品蓁</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-1 md:gap-2 flex-shrink-0">
                                <button onClick={decreaseFontSize} disabled={fontSizeLevel === 0} className={`flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-full transition-colors ${fontSizeLevel === 0 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-700'}`}>
                                    <span className="font-bold text-base md:text-lg">A-</span>
                                </button>
                                <button onClick={increaseFontSize} disabled={fontSizeLevel === fontConfig.length - 1} className={`flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-full transition-colors ${fontSizeLevel === fontConfig.length - 1 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-700'}`}>
                                    <span className="font-bold text-base md:text-lg">A+</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto scrollbar-hide flex flex-col w-full">
                        <div className="w-full p-4 md:p-6 space-y-4 md:space-y-6 pb-48 md:pb-56">
                            {messages.map((msg) => (
                                <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    {msg.sender === 'bot' && <BotAvatar />}
                                    <div className={`flex flex-col ${msg.sender === 'user' ? 'items-end' : 'items-start'} max-w-[90%] md:max-w-[85%] lg:max-w-[75%]`}>
                                        {msg.sender === 'bot' && <span className="text-xs md:text-sm text-gray-700 mb-1 ml-1 font-medium">{BOT_NAME}</span>}
                                        <div className={`relative px-4 py-2.5 md:px-5 md:py-3.5 shadow-sm leading-relaxed transition-all duration-300 ${fontConfig[fontSizeLevel].msg} ${msg.sender === 'user' ? 'bg-[#85e249] text-black rounded-2xl rounded-tr-sm md:rounded-3xl md:rounded-tr-md' : 'bg-white text-black rounded-2xl rounded-tl-sm md:rounded-3xl md:rounded-tl-md'} whitespace-pre-wrap`}>
                                            {msg.type === 'text' && msg.text}
                                            {msg.type === 'rich-text' && msg.content}
                                            {msg.type === 'overview-tables' && msg.text}
                                            {msg.type === 'image' && msg.mediaUrl && (
                                                <div className="mt-2 md:mt-3 rounded-xl md:rounded-2xl overflow-hidden border border-gray-200 relative group">
                                                    <img src={msg.mediaUrl} alt="分享圖片" className="w-full object-cover max-h-48 md:max-h-80 hover:opacity-95 transition-opacity cursor-pointer" onClick={() => setZoomedImage(msg.mediaUrl)} />
                                                    <div className="absolute bottom-2 right-2 bg-black/50 text-white text-[10px] px-2 py-1 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">點擊放大</div>
                                                </div>
                                            )}
                                            {msg.type === 'overview-tables' && (
                                                <>
                                                    <div className="mt-3 flex flex-col lg:flex-row gap-4 w-full lg:items-stretch">
                                                        <div className="flex-1 bg-purple-50 rounded-xl p-3 border border-purple-200 shadow-sm flex flex-col w-full min-w-0">
                                                            <div className="font-bold text-center border-b border-purple-200 pb-2 text-purple-900 text-[1.1em] flex-none">編制玉東（兼特教承辦人）</div>
                                                            <div className="text-[0.85em] text-gray-600 pt-3 pb-1 lg:pt-3 lg:pb-1 leading-snug text-center flex flex-col justify-center gap-0.5 lg:h-24 flex-none">
                                                                <span>一週 6 節國文 （入班）</span><span>4 節數學 （抽離）</span><span>1 節特殊需求 （外加）</span><span>1 節鑑定諮詢</span>
                                                            </div>
                                                            <div className="w-full overflow-x-auto scrollbar-hide mt-1 rounded-lg outline outline-1 outline-purple-200 lg:flex-1 flex flex-col">
                                                                <table className="w-full text-center border-collapse bg-white lg:h-full h-auto">
                                                                    <thead className="bg-purple-100 text-[0.9em] text-purple-900">
                                                                        <tr><th className="py-2 px-2"></th><th className="py-2 px-2 border-l border-purple-200">智能障礙</th><th className="py-2 px-2 border-l border-purple-200">識字型學習障礙</th></tr>
                                                                    </thead>
                                                                    <tbody className="text-[1em] text-gray-700 divide-y divide-purple-100">
                                                                        <tr><td className="py-2 px-2 font-medium bg-gray-50">７年級</td><td className="py-2 px-2 border-l border-purple-100"></td><td className="py-2 px-2 border-l border-purple-100 font-bold text-purple-700">1<span className="text-[0.7em] font-normal text-purple-500 ml-0.5">（114-2 轉學）</span></td></tr>
                                                                        <tr><td className="py-2 px-2 font-medium bg-gray-50">８年級</td><td className="py-2 px-2 border-l border-purple-100 font-bold text-purple-700">1</td><td className="py-2 px-2 border-l border-purple-100"></td></tr>
                                                                        <tr><td className="py-2 px-2 font-medium bg-gray-50">９年級</td><td className="py-2 px-2 border-l border-purple-100 font-bold text-purple-700">1</td><td className="py-2 px-2 border-l border-purple-100 font-bold text-purple-700">1</td></tr>
                                                                    </tbody>
                                                                    <tfoot className="bg-purple-50 text-[0.95em]"><tr><td colSpan={3} className="py-2 font-bold text-purple-900 border-t-2 border-purple-300">目前共 3 位</td></tr></tfoot>
                                                                </table>
                                                            </div>
                                                        </div>
                                                        <div className="flex-1 bg-green-50 rounded-xl p-3 border border-green-200 shadow-sm flex flex-col w-full min-w-0">
                                                            <div className="font-bold text-center border-b border-green-200 pb-2 text-green-900 text-[1.1em] flex-none">巡迴瑞穗</div>
                                                            <div className="text-[0.85em] text-gray-600 pt-3 pb-1 lg:pt-3 lg:pb-1 leading-snug text-center flex flex-col justify-center gap-0.5 lg:h-24 flex-none"><span>一週 6 節數學 （抽離）</span></div>
                                                            <div className="w-full overflow-x-auto scrollbar-hide mt-1 rounded-lg outline outline-1 outline-green-200 lg:flex-1 flex flex-col">
                                                                <table className="w-full text-center border-collapse bg-white lg:h-full h-auto">
                                                                    <thead className="bg-green-100 text-[0.9em] text-green-900">
                                                                        <tr><th className="py-2 px-2"></th><th className="py-2 px-2 border-l border-green-200">智能障礙</th><th className="py-2 px-2 border-l border-green-200">識字型學習障礙</th></tr>
                                                                    </thead>
                                                                    <tbody className="text-[1em] text-gray-700">
                                                                        <tr><td className="py-2 px-2 font-medium bg-gray-50">７年級</td><td className="py-2 px-2 border-l border-green-100 font-bold text-green-700 text-[1.2em]">2</td><td className="py-2 px-2 border-l border-green-100 font-bold text-green-700 text-[1.2em]">4</td></tr>
                                                                    </tbody>
                                                                    <tfoot className="bg-green-50 text-[0.95em]"><tr><td colSpan={3} className="py-2 font-bold text-green-900 border-t-2 border-green-300">目前共 6 位</td></tr></tfoot>
                                                                </table>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="mt-4 text-black text-[0.95em]">請輸入【分享】繼續。</div>
                                                </>
                                            )}
                                        </div>
                                        <span className="text-[10px] md:text-xs text-gray-600 mt-1 mx-1">{msg.time}</span>
                                    </div>
                                </div>
                            ))}
                            {isTyping && (
                                <div className="flex justify-start"><BotAvatar /><div className="bg-white px-4 py-3 md:px-5 md:py-4 rounded-2xl rounded-tl-sm md:rounded-3xl md:rounded-tl-md shadow-sm flex items-center gap-1.5 md:gap-2"><div className="w-2 h-2 md:w-2.5 md:h-2.5 bg-gray-400 rounded-full animate-bounce"></div><div className="w-2 h-2 md:w-2.5 md:h-2.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.2s' }}></div><div className="w-2 h-2 md:w-2.5 md:h-2.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.4s' }}></div></div></div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>
                    </div>

                    <div className="absolute bottom-0 w-full bg-gray-100 border-t border-gray-300 flex flex-col shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
                        {showRichMenu && (
                            <div className="w-full bg-gray-50 border-b border-gray-200">
                                <div className="w-full grid grid-cols-2 md:grid-cols-4 p-2 md:p-4 gap-2 md:gap-3">
                                    <button onClick={() => handleSendMessage('教材調整')} disabled={isTyping} className={`bg-white border-2 border-[#85e249] rounded-xl p-2 md:p-3 flex flex-col items-center justify-center gap-1 shadow-sm transition-colors ${isTyping ? 'opacity-50 cursor-not-allowed' : 'hover:bg-green-50 active:scale-[0.98]'}`}>
                                        <div className="w-8 h-8 md:w-10 md:h-10 bg-green-100 rounded-full flex items-center justify-center text-green-600 mb-0.5"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 md:w-5 md:h-5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
                                        <span className={`font-bold text-gray-700 text-center leading-tight ${fontConfig[fontSizeLevel].menu}`}>1. 教材調整</span>
                                    </button>
                                    <button onClick={() => handleSendMessage('入班支援')} disabled={isTyping} className={`bg-white border-2 border-blue-400 rounded-xl p-2 md:p-3 flex flex-col items-center justify-center gap-1 shadow-sm transition-colors ${isTyping ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-50 active:scale-[0.98]'}`}>
                                        <div className="w-8 h-8 md:w-10 md:h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mb-0.5"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 md:w-5 md:h-5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
                                        <span className={`font-bold text-gray-700 text-center leading-tight ${fontConfig[fontSizeLevel].menu}`}>2. 入班支援</span>
                                    </button>
                                    <button onClick={() => handleSendMessage('好難喔')} disabled={isTyping} className={`bg-white border-2 border-orange-400 rounded-xl p-2 md:p-3 flex flex-col items-center justify-center gap-1 shadow-sm transition-colors ${isTyping ? 'opacity-50 cursor-not-allowed' : 'hover:bg-orange-50 active:scale-[0.98]'}`}>
                                        <div className="w-8 h-8 md:w-10 md:h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-500 mb-0.5"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 md:w-6 md:h-6"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg></div>
                                        <span className={`font-bold text-gray-700 text-center leading-tight ${fontConfig[fontSizeLevel].menu}`}>3. 好難喔</span>
                                    </button>
                                    <button onClick={() => handleSendMessage('結尾')} disabled={isTyping} className={`bg-white border-2 border-purple-400 rounded-xl p-2 md:p-3 flex flex-col items-center justify-center gap-1 shadow-sm transition-colors ${isTyping ? 'opacity-50 cursor-not-allowed' : 'hover:bg-purple-50 active:scale-[0.98]'}`}>
                                        <div className="w-8 h-8 md:w-10 md:h-10 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 mb-0.5"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 md:w-5 md:h-5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg></div>
                                        <span className={`font-bold text-gray-700 text-center leading-tight ${fontConfig[fontSizeLevel].menu}`}>4. 結尾</span>
                                    </button>
                                </div>
                            </div>
                        )}
                        <div className="w-full flex items-center gap-2 md:gap-4 px-3 md:px-4 py-2 md:py-3">
                            <button onClick={() => setShowRichMenu(!showRichMenu)} className="p-1.5 md:p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-200 rounded-full transition-colors"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 md:w-7 md:h-7"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
                            <div className={`flex-1 bg-white rounded-full flex items-center px-4 md:px-6 py-1.5 md:py-2 shadow-inner border border-gray-200 ${isTyping ? 'opacity-70 bg-gray-50' : ''}`}>
                                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyDown={handleKeyDown} disabled={isTyping} placeholder={isTyping ? "機器人輸入中……" : "請輸入關鍵字……"} className="flex-1 bg-transparent outline-none text-[15px] md:text-lg py-1 disabled:cursor-not-allowed" />
                            </div>
                            <button onClick={() => handleSendMessage()} disabled={!inputValue.trim() || isTyping} className={`p-1.5 md:p-2 rounded-full transition-colors ${inputValue.trim() && !isTyping ? 'text-[#1d4ed8] hover:bg-blue-100' : 'text-gray-400 cursor-not-allowed'}`}><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 md:w-7 md:h-7"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></button>
                        </div>
                        <div className="h-4 md:h-0 w-full bg-gray-100"></div>
                    </div>

                    {zoomedImage && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center animate-in fade-in duration-200 overflow-hidden" onClick={() => setZoomedImage(null)}>
                            <button onClick={() => setZoomedImage(null)} className="fixed top-4 right-4 md:top-6 md:right-6 text-white/80 hover:text-white bg-black/50 hover:bg-black/80 rounded-full p-2 md:p-3 transition-all z-10"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 md:w-8 md:h-8"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                            <img src={zoomedImage} alt="放大圖片" className="w-[100vw] h-[100vh] max-w-[100vw] max-h-[100vh] object-contain shadow-2xl rounded-md cursor-zoom-out scale-[0.97] transition-transform duration-300" onClick={(e) => e.stopPropagation()} onDoubleClick={() => setZoomedImage(null)} />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
